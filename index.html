<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homestead</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #060d2b; }
    #app { width: 100vw; height: 100vh; display: block; }
    canvas { display: block; }


    /* ══════════════════════════════════════════════════════════════
       PIXEL-ART STATS PANEL — left overlay
       ══════════════════════════════════════════════════════════════ */
    #stats-panel {
      position: fixed;
      top: 0;
      left: 0;
      width: 272px;
      height: 100vh;
      pointer-events: none;
      z-index: 10;
      display: flex;
      flex-direction: column;

      /* dark background with subtle scanlines */
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 3px,
          rgba(0, 0, 0, 0.08) 3px,
          rgba(0, 0, 0, 0.08) 4px
        ),
        rgba(4, 8, 24, 0.82);

      border-right: 2px solid rgba(120, 160, 255, 0.18);
      box-shadow: inset -12px 0 32px rgba(0,0,0,0.3), 4px 0 24px rgba(0,0,0,0.4);

      font-family: 'Press Start 2P', 'Courier New', monospace;
      font-size: 7px;
      color: #ccd8ff;
      line-height: 1.4;
      image-rendering: pixelated;
    }

    .sp-top {
      flex-shrink: 0;
      padding: 20px 18px 0;
    }

    .rss-scroll-area {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 0 18px;
      scrollbar-width: thin;
      scrollbar-color: rgba(100, 140, 230, 0.25) transparent;
    }
    .rss-scroll-area::-webkit-scrollbar { width: 3px; }
    .rss-scroll-area::-webkit-scrollbar-track { background: transparent; }
    .rss-scroll-area::-webkit-scrollbar-thumb { background: rgba(100,140,230,0.3); border-radius: 2px; }

    .sp-bottom {
      flex-shrink: 0;
      padding: 0 18px 18px;
    }

    .sp-title {
      font-size: 12px;
      color: #ffffff;
      letter-spacing: 0.12em;
      margin-bottom: 24px;
      text-shadow: 0 0 14px rgba(100, 160, 255, 0.9), 2px 2px 0 rgba(0,0,0,0.8);
    }

    .sp-group {
      margin-bottom: 20px;
    }

    .sp-group-label {
      font-size: 7px;
      color: #7799ee;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
      padding-bottom: 5px;
      border-bottom: 1px solid rgba(100, 140, 230, 0.30);
      text-shadow: 0 0 6px rgba(100, 140, 255, 0.6);
    }

    .sp-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 9px;
      padding: 0 2px;
    }

    .sp-room {
      color: #8899bb;
      font-size: 7px;
      letter-spacing: 0.05em;
    }

    .sp-val {
      font-size: 9px;
      color: #ffffff;
      text-align: right;
      min-width: 60px;
      text-shadow: 0 0 8px currentColor;
      transition: color 1s ease;
    }

    .sp-divider {
      height: 1px;
      background: rgba(100, 140, 230, 0.25);
      margin: 16px 0 14px;
    }

    .sp-weather {
      font-size: 7px;
      color: #556688;
      margin-top: 6px;
      letter-spacing: 0.08em;
    }

    /* ── Quick link badges ── */
    .ql-group { margin-bottom: 18px; }

    .ql-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      pointer-events: auto;
    }

    .ql-badge {
      font-family: 'Press Start 2P', 'Courier New', monospace;
      font-size: 7px;
      text-decoration: none;
      padding: 6px 10px;
      border: 1px solid;
      border-radius: 2px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: filter 0.15s ease;
      image-rendering: pixelated;
    }
    .ql-badge:hover { filter: brightness(1.5); }

    /* ── RSS headlines ── */
    .rss-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .rss-item {
      margin-bottom: 9px;
      pointer-events: auto;
    }

    .rss-link {
      font-family: 'Press Start 2P', 'Courier New', monospace;
      font-size: 6px;
      color: #99aabb;
      text-decoration: none;
      line-height: 1.8;
      display: -webkit-box;
      overflow: hidden;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      transition: color 0.15s;
    }
    .rss-link:hover { color: #ddeeff; }

    .rss-err {
      font-family: 'Press Start 2P', 'Courier New', monospace;
      font-size: 6px;
      color: #445566;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div id="app"></div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
